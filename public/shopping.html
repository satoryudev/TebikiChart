<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キツネ通販</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #fff8f0;
    color: #333;
    min-height: 100vh;
  }

  .topbar {
    background: linear-gradient(135deg, #ea580c, #f97316, #fb923c);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 20px rgba(234,88,12,0.4);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    text-decoration: none;
  }
  .fox-logo {
    font-size: 2.5rem;
    animation: foxWag 2s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes foxWag {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(10deg); }
    75% { transform: rotate(-10deg); }
  }
  .brand-name { color: #fff; font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; }
  .brand-sub { color: rgba(255,255,255,0.7); font-size: 0.7rem; }

  .search-bar {
    display: flex;
    flex: 1;
    max-width: 400px;
    margin: 0 20px;
  }
  .search-bar input {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 25px 0 0 25px;
    font-size: 0.95rem;
    outline: none;
  }
  .search-btn {
    background: #7c2d12;
    border: none;
    border-radius: 0 25px 25px 0;
    color: #fff;
    padding: 10px 16px;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.2s;
  }
  .search-btn:hover { background: #9a3412; }

  .cart-btn {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 12px;
    color: #fff;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
    position: relative;
  }
  .cart-btn:hover { background: rgba(255,255,255,0.3); }
  .cart-count {
    background: #fff;
    color: #ea580c;
    border-radius: 50%;
    width: 20px; height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: bold;
  }

  .banner {
    background: linear-gradient(135deg, #fed7aa, #fdba74, #fb923c);
    padding: 40px 20px;
    text-align: center;
  }
  .banner h2 { font-size: 2rem; color: #7c2d12; }
  .banner p { color: #9a3412; margin-top: 8px; }
  .banner .tag {
    display: inline-block;
    background: #ea580c;
    color: #fff;
    padding: 5px 16px;
    border-radius: 20px;
    font-size: 0.85rem;
    margin-top: 12px;
  }

  .categories {
    display: flex;
    gap: 10px;
    padding: 15px 20px;
    overflow-x: auto;
    background: #fff;
    border-bottom: 1px solid #fed7aa;
  }
  .cat-btn {
    flex-shrink: 0;
    background: #fff8f0;
    border: 2px solid #fed7aa;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    color: #9a3412;
  }
  .cat-btn.active, .cat-btn:hover {
    background: linear-gradient(135deg, #ea580c, #f97316);
    border-color: #ea580c;
    color: #fff;
  }

  .main { max-width: 1100px; margin: 0 auto; padding: 25px 20px; }

  .section-title {
    font-size: 1.3rem;
    font-weight: bold;
    color: #7c2d12;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }
  .product-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    border: 2px solid transparent;
  }
  .product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 30px rgba(234,88,12,0.2);
    border-color: #fb923c;
  }
  .product-img {
    width: 100%;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    background: linear-gradient(135deg, #fff8f0, #fed7aa);
  }
  .product-info { padding: 14px; }
  .product-name { font-weight: bold; font-size: 0.95rem; color: #1c1917; margin-bottom: 5px; }
  .product-sub { font-size: 0.78rem; color: #a8a29e; margin-bottom: 10px; }
  .product-price { font-size: 1.3rem; font-weight: bold; color: #ea580c; }
  .product-original { font-size: 0.8rem; color: #a8a29e; text-decoration: line-through; margin-left: 5px; }
  .product-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .add-cart-btn {
    flex: 1;
    background: linear-gradient(135deg, #ea580c, #f97316);
    border: none;
    border-radius: 8px;
    color: #fff;
    padding: 9px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: bold;
    transition: opacity 0.2s;
  }
  .add-cart-btn:hover { opacity: 0.85; }
  .wish-btn {
    background: #fff8f0;
    border: 2px solid #fed7aa;
    border-radius: 8px;
    padding: 9px 12px;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .wish-btn:hover, .wish-btn.active { background: #fde7d3; border-color: #fb923c; }

  .badge {
    display: inline-block;
    background: #dc2626;
    color: #fff;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* Cart modal */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: none;
    justify-content: flex-end;
  }
  .cart-overlay.open { display: flex; }
  .cart-panel {
    background: #fff;
    width: 380px;
    max-width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 25px;
    box-shadow: -10px 0 40px rgba(0,0,0,0.2);
    animation: slideCart 0.3s ease;
  }
  @keyframes slideCart {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }
  .cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid #fed7aa;
  }
  .cart-title { font-size: 1.3rem; font-weight: bold; color: #7c2d12; }
  .close-cart { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #a8a29e; }
  .cart-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #fef3c7;
    align-items: center;
  }
  .cart-item-emoji { font-size: 2.5rem; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: bold; font-size: 0.9rem; }
  .cart-item-price { color: #ea580c; font-weight: bold; margin-top: 4px; }
  .cart-item-qty {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .qty-btn {
    background: #fed7aa;
    border: none;
    border-radius: 6px;
    width: 24px; height: 24px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qty-num { font-size: 0.9rem; font-weight: bold; }
  .remove-item { background: none; border: none; color: #f87171; cursor: pointer; font-size: 1.2rem; }

  .cart-total {
    margin-top: 20px;
    padding: 15px;
    background: #fff8f0;
    border-radius: 12px;
  }
  .total-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
  .total-final { font-size: 1.3rem; font-weight: bold; color: #ea580c; }
  .checkout-btn {
    width: 100%;
    margin-top: 15px;
    background: linear-gradient(135deg, #ea580c, #f97316);
    border: none;
    border-radius: 12px;
    color: #fff;
    padding: 15px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .checkout-btn:hover { opacity: 0.9; }
  .empty-cart { text-align: center; color: #a8a29e; padding: 40px 0; }
  .empty-cart .big { font-size: 4rem; display: block; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="fox-logo">🦊</span>
    <div>
      <div class="brand-name">キツネ通販</div>
      <div class="brand-sub">何でも見つかる！</div>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="商品を検索..." oninput="filterProducts()">
    <button class="search-btn" id="btn-search">🔍</button>
  </div>
  <button class="cart-btn" id="btn-cart" onclick="toggleCart()">
    🛒 カート <span class="cart-count" id="cart-count">0</span>
  </button>
</div>

<div class="banner">
  <div style="font-size:3rem">🦊✨</div>
  <h2>キツネが選ぶ今週のオススメ！</h2>
  <p>送料無料 · 最大50%OFF · ポイント2倍</p>
  <span class="tag">🔥 期間限定セール中</span>
</div>

<div class="categories">
  <button class="cat-btn active" id="cat-all" onclick="filterCat(this,'all')">すべて</button>
  <button class="cat-btn" id="cat-food" onclick="filterCat(this,'food')">🍜 食品</button>
  <button class="cat-btn" id="cat-tech" onclick="filterCat(this,'tech')">💻 電子機器</button>
  <button class="cat-btn" id="cat-fashion" onclick="filterCat(this,'fashion')">👗 ファッション</button>
  <button class="cat-btn" id="cat-book" onclick="filterCat(this,'book')">📚 本・文具</button>
  <button class="cat-btn" id="cat-sports" onclick="filterCat(this,'sports')">⚽ スポーツ</button>
  <button class="cat-btn" id="cat-beauty" onclick="filterCat(this,'beauty')">💄 美容</button>
</div>

<div class="main">
  <div class="section-title">🔥 人気商品 <span class="badge">SALE</span></div>
  <div class="products" id="product-grid"></div>
</div>

<!-- カートパネル -->
<div class="cart-overlay" id="cart-overlay" onclick="handleOverlay(event)">
  <div class="cart-panel">
    <div class="cart-header">
      <div class="cart-title">🛒 カート</div>
      <button class="close-cart" id="btn-close-cart" onclick="toggleCart()">✕</button>
    </div>
    <div id="cart-content"></div>
  </div>
</div>

<script>
const PRODUCTS = [
  { id:1, name:'ラーメンセット', sub:'博多風とんこつ 5食入り', price:1280, orig:1980, emoji:'🍜', cat:'food' },
  { id:2, name:'ワイヤレスイヤホン', sub:'ノイズキャンセリング対応', price:4980, orig:8900, emoji:'🎧', cat:'tech' },
  { id:3, name:'おしゃれトート', sub:'撥水加工 大容量', price:2480, orig:3980, emoji:'👜', cat:'fashion' },
  { id:4, name:'プログラミング入門', sub:'Python基礎から応用まで', price:1680, orig:2200, emoji:'📗', cat:'book' },
  { id:5, name:'サッカーボール', sub:'5号球 公式サイズ', price:3200, orig:4500, emoji:'⚽', cat:'sports' },
  { id:6, name:'保湿クリーム', sub:'敏感肌対応 80g', price:1580, orig:2380, emoji:'🧴', cat:'beauty' },
  { id:7, name:'スマートウォッチ', sub:'防水 心拍計搭載', price:9800, orig:15000, emoji:'⌚', cat:'tech' },
  { id:8, name:'チョコレートセット', sub:'高級ベルギー産 20枚', price:980, orig:1500, emoji:'🍫', cat:'food' },
  { id:9, name:'ランニングシューズ', sub:'軽量ソール メンズ/レディース', price:6800, orig:9800, emoji:'👟', cat:'sports' },
  { id:10, name:'手帳セット', sub:'2025年版 週間スケジュール', price:890, orig:1200, emoji:'📒', cat:'book' },
  { id:11, name:'Tシャツ 3枚組', sub:'綿100% 無地 サイズ各種', price:1980, orig:2980, emoji:'👕', cat:'fashion' },
  { id:12, name:'口紅セット', sub:'10色入り 長持ちタイプ', price:2800, orig:4200, emoji:'💄', cat:'beauty' },
];

let cart = [];
let currentCat = 'all';
let searchQuery = '';
let wishlist = new Set();

function getFiltered() {
  return PRODUCTS.filter(p => {
    const matchCat = currentCat === 'all' || p.cat === currentCat;
    const matchSearch = p.name.includes(searchQuery) || p.sub.includes(searchQuery);
    return matchCat && matchSearch;
  });
}

function filterCat(btn, cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

function filterProducts() {
  searchQuery = document.getElementById('search-input').value;
  renderProducts();
}

function addToCart(id) {
  const existing = cart.find(c => c.id === id);
  if (existing) existing.qty++;
  else {
    const p = PRODUCTS.find(p => p.id === id);
    cart.push({ ...p, qty: 1 });
  }
  updateCartCount();
  // flash animation
  const btn = document.querySelector(`[data-id="${id}"]`);
  if (btn) { btn.textContent = '✅ 追加済み'; setTimeout(() => btn.textContent = 'カートへ', 1000); }
}

function toggleWish(id) {
  if (wishlist.has(id)) wishlist.delete(id);
  else wishlist.add(id);
  renderProducts();
}

function updateCartCount() {
  document.getElementById('cart-count').textContent = cart.reduce((s, c) => s + c.qty, 0);
}

function toggleCart() {
  document.getElementById('cart-overlay').classList.toggle('open');
  renderCart();
}

function handleOverlay(e) {
  if (e.target === document.getElementById('cart-overlay')) toggleCart();
}

function changeQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
  updateCartCount();
  renderCart();
}

function renderCart() {
  const content = document.getElementById('cart-content');
  if (cart.length === 0) {
    content.innerHTML = '<div class="empty-cart"><span class="big">🛒</span>カートは空です<br><small style="color:#a8a29e">商品を追加してみよう！</small></div>';
    return;
  }
  const subtotal = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const shipping = subtotal >= 3000 ? 0 : 350;
  content.innerHTML = `
    ${cart.map(c => `
      <div class="cart-item">
        <span class="cart-item-emoji">${c.emoji}</span>
        <div class="cart-item-info">
          <div class="cart-item-name">${c.name}</div>
          <div class="cart-item-price">¥${c.price.toLocaleString()}</div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="changeQty(${c.id},-1)">-</button>
            <span class="qty-num">${c.qty}</span>
            <button class="qty-btn" onclick="changeQty(${c.id},1)">+</button>
          </div>
        </div>
        <button class="remove-item" onclick="changeQty(${c.id},-999)">🗑️</button>
      </div>
    `).join('')}
    <div class="cart-total">
      <div class="total-row"><span>小計</span><span>¥${subtotal.toLocaleString()}</span></div>
      <div class="total-row"><span>送料</span><span>${shipping === 0 ? '<span style="color:#16a34a">無料</span>' : '¥'+shipping}</span></div>
      <div class="total-row"><span class="total-final">合計</span><span class="total-final">¥${(subtotal+shipping).toLocaleString()}</span></div>
      ${shipping > 0 ? `<div style="font-size:0.75rem;color:#a8a29e;margin-top:8px">¥${(3000-subtotal).toLocaleString()}追加で送料無料！</div>` : ''}
    </div>
    <button class="checkout-btn" onclick="checkout()">🦊 注文を確定する</button>
  `;
}

function checkout() {
  alert('🦊 ご注文ありがとうございます！\nご注文が確定されました。');
  cart = [];
  updateCartCount();
  toggleCart();
}

function renderProducts() {
  const filtered = getFiltered();
  const grid = document.getElementById('product-grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#a8a29e;padding:40px">🦊 商品が見つかりません</div>';
    return;
  }
  grid.innerHTML = filtered.map(p => {
    const discount = Math.round((1 - p.price / p.orig) * 100);
    return `
    <div class="product-card">
      <div class="product-img">${p.emoji}</div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-sub">${p.sub}</div>
        <div>
          <span class="product-price">¥${p.price.toLocaleString()}</span>
          <span class="product-original">¥${p.orig.toLocaleString()}</span>
          <span class="badge">-${discount}%</span>
        </div>
        <div class="product-actions">
          <button class="add-cart-btn" data-id="${p.id}" onclick="addToCart(${p.id})">カートへ</button>
          <button class="wish-btn ${wishlist.has(p.id) ? 'active' : ''}" onclick="toggleWish(${p.id})">${wishlist.has(p.id) ? '❤️' : '🤍'}</button>
        </div>
      </div>
    </div>
  `}).join('');
}

renderProducts();
</script>
<script>document.write('<scr'+'ipt src="/embed.js?v='+Date.now()+'"><\/scr'+'ipt>')</script>
</body>
</html>
